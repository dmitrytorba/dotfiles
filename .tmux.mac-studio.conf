# Mac Studio tmux configuration
# Runs ad-three and ad-four dev stack

# Start a new session in detached mode (-d) with a custom name
new-session -s ad -n devs-three -d

# Create additional windows and name them
new-window -t ad -n devs-four
new-window -t ad -n inngest
new-window -t ad -n temporal-three
new-window -t ad -n temporal-four
new-window -t ad -n agent-three
new-window -t ad -n agent-four

# Send commands to a specific window in the session
send-keys -t ad:1 'cd ~/ad-three/ai-companion && PORT=5003 npm run dev' C-m
send-keys -t ad:2 'cd ~/ad-four/ai-companion && PORT=5004 npm run dev' C-m
send-keys -t ad:3 'cd ~/ad-three/ai-companion && env -u npm_config_ignore_scripts -u NPM_CONFIG_IGNORE_SCRIPTS NPM_CONFIG_CACHE=$(mktemp -d) npx --yes --ignore-scripts=false inngest-cli@latest dev --no-discovery -u http://localhost:5003/api/inngest -u http://localhost:5004/api/inngest' C-m
send-keys -t ad:4 'cd ~/ad-three/ai-companion && npm run temporal:worker' C-m
send-keys -t ad:5 'cd ~/ad-four/ai-companion && npm run temporal:worker' C-m
send-keys -t ad:6 'cd ~/ad-three/ai-companion && agent worker start --name devs-three' C-m
send-keys -t ad:7 'cd ~/ad-four/ai-companion && agent worker start --name devs-four' C-m

# Attach to the session when tmux is launched
attach-session -t ad
