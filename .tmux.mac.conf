# Mac tmux configuration (non-Studio)
# Sourced on macOS hosts that are not Mac Studio

# Start a new session in detached mode (-d) with a custom name
new-session -s ad -n devs-one -d

# Create additional windows and name them
new-window -t ad -n devs-two
new-window -t ad -n inngest
new-window -t ad -n temporal-one
new-window -t ad -n temporal-two
new-window -t ad -n agent-one
new-window -t ad -n agent-two

# Send commands to a specific window in the session
# Note: These lines need to be on one line with `\;` separation if using in a script
send-keys -t ad:1 'cd ~/ad-one/ai-companion && PORT=5001 npm run dev' C-m
send-keys -t ad:2 'cd ~/ad-two/ai-companion && PORT=5002 npm run dev' C-m
send-keys -t ad:3 'cd ~/ad-one/ai-companion && env -u npm_config_ignore_scripts -u NPM_CONFIG_IGNORE_SCRIPTS NPM_CONFIG_CACHE=$(mktemp -d) npx --yes --ignore-scripts=false inngest-cli@latest dev --no-discovery -u http://localhost:5001/api/inngest -u http://localhost:5002/api/inngest' C-m
send-keys -t ad:4 'cd ~/ad-one/ai-companion && npm run temporal:worker' C-m
send-keys -t ad:5 'cd ~/ad-two/ai-companion && npm run temporal:worker' C-m
send-keys -t ad:6 'cd ~/ad-one/ai-companion && agent worker start --name devs-one' C-m
send-keys -t ad:7 'cd ~/ad-two/ai-companion && agent worker start --name devs-two' C-m

# Attach to the session when tmux is launched
attach-session -t ad

